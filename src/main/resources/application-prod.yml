spring:

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

management:
  endpoint:
    health:
      show-details: never

jwt:
  secret: ${JWT_SECRET}

storage:
  bucket: ${STORAGE_BUCKET}
  endpoint: ${STORAGE_ENDPOINT}
  access-key: ${STORAGE_ACCESS_KEY}
  secret-key: ${STORAGE_SECRET_KEY}

cors:
  allowed-origins:
    - https://pelada.com.br
    - https://www.pelada.com.br
    - https://app.pelada.com.br